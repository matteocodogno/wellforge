# Continuously deploy the presentation site (site/) to GitHub Pages.
#
# Runs on every push to main: the live site tracks main automatically. Also
# dispatchable by hand from the Actions tab.
#
# One-time prerequisite (already handled, or: Settings → Pages → Source = GitHub Actions):
# Pages must be set to build from GitHub Actions for this deploy to publish.
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push supersede an in-flight deploy — always publish the latest main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
