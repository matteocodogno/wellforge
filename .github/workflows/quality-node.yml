# Reusable quality gate — Node/TypeScript packages (frontend or Hono backend).
# Called by generated projects:  uses: matteocodogno/wellforge/.github/workflows/quality-node.yml@gates-v0
# Thresholds live HERE — changing them requires a PR to gates/ (the single discretion point).
name: quality-node

on:
  workflow_call:
    inputs:
      working-directory:
        description: Package directory (e.g. frontend, backend)
        required: true
        type: string
      gates-repo:
        description: owner/repo hosting gate configs
        required: false
        type: string
        default: matteocodogno/wellforge
      gates-ref:
        description: tag/ref of the gates release
        required: false
        type: string
        default: gates-v0
      # Ratchet baselines for brownfield adoption: 0 (default) = central
      # thresholds apply. A non-zero baseline replaces the central minimum for
      # THIS project — it may only ever be raised (PR review enforces that),
      # and the gap to the central target is reported on every run.
      coverage-lines-baseline:
        description: per-project line-coverage ratchet (0 = central threshold)
        required: false
        type: number
        default: 0
      coverage-branches-baseline:
        description: per-project branch-coverage ratchet (0 = central threshold)
        required: false
        type: number
        default: 0
      # Rigor tier (see the wellforge rigor-tiers skill). `production` (default) enforces
      # everything. `mvp` makes COVERAGE advisory — the numbers are still computed and
      # reported (gap-to-target), but they don't fail the run. Lint, typecheck, dependency
      # audit and SAST always block, in every tier — the non-negotiable security floor.
      rigor:
        description: production (enforce all) | mvp (coverage advisory)
        required: false
        type: string
        default: production

env:
  # ── Central thresholds ──────────────────────────────────────────────
  COVERAGE_LINES: "80"
  COVERAGE_BRANCHES: "70"
  AUDIT_LEVEL: high
  SEMGREP_VERSION: 1.96.0
  SEMGREP_SEND_METRICS: "off"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout gate configs
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.gates-repo }}
          ref: ${{ inputs.gates-ref }}
          path: .wellforge-gates

      - name: Install toolchain (mise)
        uses: jdx/mise-action@v2

      - name: Require lockfile (reproducible builds)
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing in ${{ inputs.working-directory }} — run 'mise run install' locally and commit the lockfile."
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run lint

      - name: Type check
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run typecheck

      - name: Tests + coverage
        working-directory: ${{ inputs.working-directory }}
        run: |
          LINES="$COVERAGE_LINES" BRANCHES="$COVERAGE_BRANCHES"
          if [ "${{ inputs.rigor }}" = "mvp" ]; then
            # rigor: mvp — coverage advisory. Run with 0 thresholds so the run never fails
            # on coverage; vitest still prints the actual table (the gap to target is visible).
            echo "::notice::rigor mvp — coverage ADVISORY (central target ${COVERAGE_LINES}% lines / ${COVERAGE_BRANCHES}% branches, not enforced). Promote with /wellforge:promote to enforce."
            LINES=0 BRANCHES=0
          else
            if [ "${{ inputs.coverage-lines-baseline }}" != "0" ]; then
              LINES="${{ inputs.coverage-lines-baseline }}"
              echo "::notice::ratchet baseline in effect: lines ≥ ${LINES}% (central target ${COVERAGE_LINES}%) — raise-only, via PR"
            fi
            if [ "${{ inputs.coverage-branches-baseline }}" != "0" ]; then
              BRANCHES="${{ inputs.coverage-branches-baseline }}"
              echo "::notice::ratchet baseline in effect: branches ≥ ${BRANCHES}% (central target ${COVERAGE_BRANCHES}%)"
            fi
          fi
          pnpm exec vitest run --coverage \
            --coverage.thresholds.lines="$LINES" \
            --coverage.thresholds.branches="$BRANCHES"

      - name: Dependency audit (fail on ${{ env.AUDIT_LEVEL }}+)
        working-directory: ${{ inputs.working-directory }}
        run: pnpm audit --prod --audit-level "$AUDIT_LEVEL"

      - name: Semgrep SAST
        working-directory: ${{ inputs.working-directory }}
        run: |
          pipx run semgrep=="$SEMGREP_VERSION" scan \
            --config "$GITHUB_WORKSPACE/.wellforge-gates/gates/configs/semgrep/wellforge.yml" \
            --config p/typescript \
            --error --severity ERROR \
            --exclude .wellforge-gates
