_subdirectory: template
_min_copier_version: "9.0.0"

# ── Common questions (every WellForge template — /welld-dev:new fills these) ──
project_name:
  type: str
  help: Human-readable project name (e.g. "Order Service")
  default: Hono React App

project_slug:
  type: str
  help: Directory + artifact name (kebab-case)
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

description:
  type: str
  help: One-line description of the project
  default: A Hono + React full-stack TypeScript monorepo.

ci:
  type: str
  help: Continuous integration provider
  choices:
    - github
    - none
  default: github

gates_repo:
  type: str
  help: owner/repo hosting the reusable gate workflows
  default: welld/wellforge

gates_ref:
  type: str
  help: Git ref/tag of the gate workflows pinned in generated CI
  default: gates-v0

generated:
  type: str
  help: Generation date (filled by /welld-dev:new via --data generated=$(date +%F))
  default: unknown
  when: false

# ── Versioning (hidden) ──
template_version:
  type: str
  default: "0.1.0"
  when: false

# ── Stack-specific questions ──
db:
  type: str
  help: >-
    Database. The hono-ts-backend skill targets PostgreSQL via Drizzle ORM.
    Choose "postgres" for the full DB stack, or "none" for a DB-less service.
  choices:
    - postgres
    - none
  default: postgres
