# Tier → concrete model, per TOOL and PROVIDER. The portable half of model routing.
#
# model-routing.yml stays tool-neutral (agent → tier by judgment level). This file resolves
# a tier to the actual model for a given tool + provider. setup/migrate let the user pick
# the provider; the adapter generates each agent's `model:` from
#   routing(agent → tier) × tiers(tool → provider → tier → model).
#
# Override freely (PR to the plugin). Keep the three tiers' RELATIVE capability intact
# (frontier > mid > cheap) — the routing rationale assumes it.
version: tiers-v1

tools:
  # Claude Code — Anthropic-only; frontmatter takes bare aliases that Claude Code resolves.
  claude:
    anthropic:
      frontier: opus
      mid:      sonnet
      cheap:    haiku

  # OpenCode — provider-agnostic; the user picks a provider at setup/migrate. Model format
  # is provider/model-id. `anthropic` is the default (parity with Claude Code) and the only
  # set we ship verified; the others are TEMPLATES — confirm the model ids for your account
  # (provider model names change) before relying on them.
  opencode:
    anthropic:                                    # ✓ default, verified
      frontier: anthropic/claude-opus-4-8
      mid:      anthropic/claude-sonnet-4-6
      cheap:    anthropic/claude-haiku-4-5-20251001
    openai:                                       # template — verify ids for your account
      frontier: openai/gpt-5
      mid:      openai/gpt-5-mini
      cheap:    openai/gpt-5-nano
    google:                                       # template — verify ids for your account
      frontier: google/gemini-2.5-pro
      mid:      google/gemini-2.5-flash
      cheap:    google/gemini-2.5-flash-lite

  # GitHub Copilot (VS Code) — provider-agnostic via the model picker, but availability
  # depends on the user's Copilot plan. `model:` in a chat mode / prompt file takes the
  # model's PICKER DISPLAY NAME (no provider/ prefix), e.g. "Claude Sonnet 4.5". Picker
  # names change often and vary by plan — treat ALL of these as templates: confirm the
  # names your Copilot plan actually exposes before relying on them. `anthropic` is the
  # default for parity with Claude Code.
  copilot:
    anthropic:                                    # default (parity) — verify picker names
      frontier: Claude Opus 4.1
      mid:      Claude Sonnet 4.5
      cheap:    Claude Haiku 4.5
    openai:                                       # template — verify names for your plan
      frontier: GPT-5
      mid:      GPT-5 mini
      cheap:    GPT-4.1
    google:                                       # template — verify names for your plan
      frontier: Gemini 2.5 Pro
      mid:      Gemini 2.5 Flash
      cheap:    Gemini 2.0 Flash
